<!DOCTYPE html>
<html>
<head>
	<title>播放M3U8文件</title>
	<!-- 引入video.js CSS文件 -->
	<link href="https://unpkg.com/video.js/dist/video-js.css" rel="stylesheet">
	<!-- 引入video.js JavaScript文件 -->
	<script src="https://unpkg.com/video.js/dist/video.js"></script>
	<!-- 引入video.js-contrib-hls插件 -->
	<script src="https://unpkg.com/videojs-contrib-hls/dist/videojs-contrib-hls.js"></script>
</head>
<body>
	<!-- 定义一个video标签 -->
	<video id="my-video" class="video-js" controls preload="auto" width="640" height="264"
	poster="poster.jpg" data-setup="{}">
		<source src="http://example.com/example.m3u8" type="application/x-mpegURL">
		<!-- 定义备用的播放源 -->
		<source src="http://example.com/example.mp4" type="video/mp4">
		<!-- 提示用户安装Flash插件 -->
		<p class="vjs-no-js">
			To view this video please enable JavaScript, and consider upgrading to a web browser that
			<a href="https://videojs.com/html5-video-support/" target="_blank">supports HTML5 video</a>
		</p>
	</video>
	<!-- 初始化video.js和HLS插件 -->
	<script>
		var player = videojs('my-video'); // 创建video.js实例
		player.hls({
			overrideNative: true // 启用HLS插件
		});
		player.src({
			src: '../index1.m3u8', // 指定M3U8文件URL
			type: 'application/x-mpegURL' // 指定M3U8文件类型
		});
		player.play(); // 播放视频
	</script>
</body>
</html>
